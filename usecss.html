<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Demo</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="Sample.css">

    <style>
        p{
            color: purple;
            font-size: 18px;
        }

        h4{
            color: darkgreen;
            text-decoration: underline;
        }

        h1{
            color: rgb(119, 151, 6);

            border: 4px solid rgb(20, 195, 148);

            background-color: rgb(205, 205, 18);

            width: fit-content;

            border-radius: 15px;

            padding: 20px;

            margin: 50px auto;

            box-shadow: 5px 5px 10px rgb(184, 17, 17);

            text-align: center;
        }

        body{
            background-color: #130f0f;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        button{
            background-color: rgb(122, 38, 161);
            color: rgb(130, 176, 16);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
        }

        button:hover{
            background-color: rgb(200, 12, 47);
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:rgb(40, 207, 243);">Register</h1>

    <h1>Login</h1>

    <p>login credentials valid</p>

    <h4>login page</h4>

    <h3>change settings</h3>

    <button>Click Me</button>

</body>
</html>
